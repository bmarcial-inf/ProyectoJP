<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="chat-container">
    <div class="header">
        🤖 Asistente Inteligente
        <button onclick="clearChat()">🧹</button>
    </div>

    <div id="chat-box"></div>

    <div class="input-area">
        <input id="input" type="text" placeholder="Escribe tu mensaje..." onkeypress="handle(event)">
        <button onclick="send()">➤</button>
    </div>
</div>

<script>
window.onload = () => {
    const box = document.getElementById("chat-box");
    box.innerHTML = localStorage.getItem("chat") || "";
    scrollBottom();
};

function handle(e){
    if(e.key === "Enter") send();
}

function scrollBottom(){
    const box = document.getElementById("chat-box");
    box.scrollTop = box.scrollHeight;
}

function saveChat(){
    localStorage.setItem(
        "chat",
        document.getElementById("chat-box").innerHTML
    );
}

function currentHour(){
    const now = new Date();
    let h = now.getHours().toString().padStart(2,"0");
    let m = now.getMinutes().toString().padStart(2,"0");
    return `${h}:${m}`;
}

function typeEffect(text, element, callback) {
    let i = 0;
    element.innerHTML = "";

    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            scrollBottom();
            setTimeout(typing, 12);
        } else {
            if(callback) callback();
        }
    }

    typing();
}

function playSound(){
    const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
    audio.volume = 0.2;
    audio.play().catch(() => {});
}

function createTypingBubble(){
    let div = document.createElement("div");
    div.className = "msg bot";
    div.innerHTML = `
        <span class="typing">
            <span></span>
            <span></span>
            <span></span>
        </span>
    `;
    return div;
}

function send() {

    let input = document.getElementById("input");
    let msg = input.value.trim();

    if(!msg) return;

    const box = document.getElementById("chat-box");

    // Usuario derecha
    let userWrap = document.createElement("div");
    userWrap.className = "msg-wrap user-wrap";

    userWrap.innerHTML = `
        <div class="sender">Tú</div>
        <div class="msg user">
            ${msg}
            <div class="time">${currentHour()}</div>
        </div>
    `;

    box.appendChild(userWrap);

    scrollBottom();
    saveChat();

    input.value = "";

    // Bot izquierda typing
    let botWrap = document.createElement("div");
    botWrap.className = "msg-wrap bot-wrap";

    let senderBot = document.createElement("div");
    senderBot.className = "sender";
    senderBot.innerText = "Bot";

    let typing = document.createElement("div");
    typing.className = "msg bot";

    botWrap.appendChild(senderBot);
    botWrap.appendChild(typing);

    typing.innerHTML = `
        <span class="typing">
            <span></span>
            <span></span>
            <span></span>
        </span>
    `;

    botWrap.appendChild(typing);
    box.appendChild(botWrap);

    scrollBottom();

    fetch("/get", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(r => r.json())
    .then(data => {

        typing.innerHTML = "";

        typeEffect(data.response, typing, () => {
            typing.innerHTML += `<div class="time">${currentHour()}</div>`;
            playSound();
            saveChat();
            scrollBottom();
        });

    });
}

function clearChat(){
    fetch("/clear").then(() => {
        document.getElementById("chat-box").innerHTML = "";
        localStorage.removeItem("chat");
    });
}
</script>

</body>
</html>
