<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="chat-container">
    <div class="header">
        🤖 Asistente Inteligente
        <button onclick="clearChat()">🧹</button>
    </div>

    <div id="chat-box"></div>

    <div class="input-area">
        <input id="input" type="text" placeholder="Escribe tu mensaje..." onkeypress="handle(event)">
        <button onclick="send()">➤</button>
    </div>
</div>

<script>
window.onload = () => {
    document.getElementById("chat-box").innerHTML =
        localStorage.getItem("chat") || "";
};

function handle(e){
    if(e.key === "Enter") send();
}

function saveChat(){
    localStorage.setItem(
        "chat",
        document.getElementById("chat-box").innerHTML
    );
}

function typeEffect(text, element, callback) {
    let i = 0;
    element.innerHTML = "";

    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 15);
        } else {
            if(callback) callback();
        }
    }

    typing();
}

function send() {
    let input = document.getElementById("input");
    let msg = input.value.trim();

    if(!msg) return;

    let box = document.getElementById("chat-box");

    // mensaje usuario normal
    let userMsg = document.createElement("div");
    userMsg.className = "msg user";
    userMsg.innerHTML = "Tú: " + msg;
    box.appendChild(userMsg);

    // mensaje temporal bot
    let botMsg = document.createElement("div");
    botMsg.className = "msg bot";
    botMsg.innerHTML = "Bot: escribiendo...";
    box.appendChild(botMsg);

    box.scrollTop = box.scrollHeight;

    fetch("/get", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(r => r.json())
    .then(data => {

        typeEffect("Bot: " + data.response, botMsg, () => {
            saveChat(); // guardar solo al terminar
            box.scrollTop = box.scrollHeight;
        });

    });

    input.value = "";
    saveChat(); // guarda mensaje usuario estático
}

function clearChat(){
    fetch("/clear").then(() => {
        document.getElementById("chat-box").innerHTML = "";
        localStorage.removeItem("chat");
    });
}
</script>

</body>
</html>
